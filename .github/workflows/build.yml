name: Build PyGeoMorph Desktop

# Multi-platform build for PyGeoMorph (Win, Linux, macOS Intel, macOS Apple Silicon).
# Apple Silicon fix: macos-latest is now arm64 (M1+); building universal2 fails when
# any wheel in the dependency tree is single-arch (numpy/scipy/opencv/pillow are
# typically single-arch). We therefore build a separate native arm64 binary on
# macos-14 and a separate native x86_64 binary on macos-13.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows-x64
            artifact: PyGeoMorph-windows-x64
            ext: .exe
          - os: ubuntu-latest
            label: Linux-x64
            artifact: PyGeoMorph-linux-x64
            ext: ''
          - os: macos-13
            label: macOS-Intel
            artifact: PyGeoMorph-macos-x86_64
            ext: ''
          - os: macos-14
            label: macOS-AppleSilicon
            artifact: PyGeoMorph-macos-arm64
            ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install poppler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Install poppler (macOS)
        if: runner.os == 'macOS'
        run: brew install poppler

      - name: Upgrade pip + install build deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build executable
        shell: bash
        run: |
          pyinstaller --noconfirm --clean PyGeoMorph.spec

      - name: List dist contents (debug)
        shell: bash
        run: ls -la dist/

      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./dist/PyGeoMorph > out.log 2> err.log &
          PID=$!
          echo "Started process PID=$PID"

          UP=0
          for i in $(seq 1 15); do
            sleep 2
            if ! kill -0 $PID 2>/dev/null; then
              echo "::error::Process exited prematurely"
              break
            fi
            if curl -fsS --max-time 3 http://127.0.0.1:5000/ > /dev/null 2>&1; then
              echo "Server is up after $((i*2))s"
              UP=1
              break
            fi
            echo "  attempt $i/15: not yet ready..."
          done

          echo "===== STDOUT ====="; cat out.log || true
          echo "===== STDERR ====="; cat err.log || true

          kill $PID 2>/dev/null || true

          if [ $UP -ne 1 ]; then
            echo "::error::Server did not respond on port 5000"
            exit 1
          fi

- name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath ".\dist\PyGeoMorph.exe" `
                                -PassThru `
                                -RedirectStandardOutput "out.log" `
                                -RedirectStandardError "err.log"
          Write-Host ("Started process PID=" + $proc.Id)

          $maxAttempts = 15
          $up = $false
          for ($i=1; $i -le $maxAttempts; $i++) {
            Start-Sleep -Seconds 2
            if ($proc.HasExited) {
              Write-Host ("::error::Process exited prematurely with code " + $proc.ExitCode)
              break
            }
            try {
              $r = Invoke-WebRequest -Uri http://127.0.0.1:5000/ `
                                     -UseBasicParsing `
                                     -TimeoutSec 3 `
                                     -ErrorAction Stop
              Write-Host ("Server is up after " + ($i*2) + "s (HTTP " + $r.StatusCode + ")")
              $up = $true
              break
            } catch {
              Write-Host ("  attempt " + $i + "/" + $maxAttempts + ": not yet ready...")
            }
          }

          Write-Host "===== STDOUT ====="
          if (Test-Path "out.log") { Get-Content "out.log" } else { Write-Host "(empty)" }
          Write-Host "===== STDERR ====="
          if (Test-Path "err.log") { Get-Content "err.log" } else { Write-Host "(empty)" }

          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

          if (-not $up) {
            Write-Host "::error::Server did not respond on port 5000"
            exit 1
          }

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/PyGeoMorph.exe staging/${{ matrix.artifact }}.exe
          else
            cp dist/PyGeoMorph staging/${{ matrix.artifact }}
            chmod +x staging/${{ matrix.artifact }}
          fi
          cp README.md LICENSE.txt staging/ 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/*
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifact tree
        run: |
          mkdir -p flat
          find release -type f \( -name "PyGeoMorph-*" -o -name "*.exe" \) -exec cp {} flat/ \;
          ls -la flat/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: flat/*
          name: PyGeoMorph ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
