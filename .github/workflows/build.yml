name: Build PyGeoMorph Desktop

# Multi-platform build for PyGeoMorph (Win, Linux, macOS Intel, macOS Apple Silicon).
# Apple Silicon fix: macos-latest is now arm64 (M1+); building universal2 fails when
# any wheel in the dependency tree is single-arch (numpy/scipy/opencv/pillow are
# typically single-arch). We therefore build a separate native arm64 binary on
# macos-14 and a separate native x86_64 binary on macos-13.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows-x64
            artifact: PyGeoMorph-windows-x64
            ext: .exe
          - os: ubuntu-latest
            label: Linux-x64
            artifact: PyGeoMorph-linux-x64
            ext: ''
          - os: macos-13
            label: macOS-Intel
            artifact: PyGeoMorph-macos-x86_64
            ext: ''
          - os: macos-14
            label: macOS-AppleSilicon
            artifact: PyGeoMorph-macos-arm64
            ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install poppler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Install poppler (macOS)
        if: runner.os == 'macOS'
        run: brew install poppler

      - name: Upgrade pip + install build deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build executable
        shell: bash
        run: |
          pyinstaller --noconfirm --clean PyGeoMorph.spec

      - name: List dist contents (debug)
        shell: bash
        run: ls -la dist/

      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./dist/PyGeoMorph &
          PID=$!
          sleep 6
          curl -fsS http://127.0.0.1:5000/ > /dev/null && echo "Server is up"
          kill $PID 2>/dev/null || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath ".\dist\PyGeoMorph.exe" -PassThru
          Start-Sleep -Seconds 8
          try {
            Invoke-WebRequest -Uri http://127.0.0.1:5000/ -UseBasicParsing | Out-Null
            Write-Host "Server is up"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/PyGeoMorph.exe staging/${{ matrix.artifact }}.exe
          else
            cp dist/PyGeoMorph staging/${{ matrix.artifact }}
            chmod +x staging/${{ matrix.artifact }}
          fi
          cp README.md LICENSE.txt staging/ 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/*
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifact tree
        run: |
          mkdir -p flat
          find release -type f \( -name "PyGeoMorph-*" -o -name "*.exe" \) -exec cp {} flat/ \;
          ls -la flat/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: flat/*
          name: PyGeoMorph ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
